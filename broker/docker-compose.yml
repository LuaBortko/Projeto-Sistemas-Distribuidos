services:

  broker:
    build:
      context: .
      dockerfile: Dockerfile-Python
    image: cc7261:pyzmq
    container_name: broker
    volumes:
      - ./broker.py:/app/main.py
    ports:
      - 5555:5555
      - 5556:5556

  broker2:
    build:
      context: .
      dockerfile: Dockerfile-Python
    image: cc7261:pyzmq
    container_name: broker2
    volumes:
      - ./broker2.py:/app/main.py
    ports:
      - 5559:5559
      - 5550:5550

  proxy:
    build:
      context: .
      dockerfile: Dockerfile-Python
    image: cc7261:pyzmq
    container_name: proxy
    volumes:
      - ./proxy.py:/app/main.py
    ports:
      - 5557:5557
      - 5558:5558

  referencia:
    build:
      context: .
      dockerfile: Dockerfile-Python
    image: cc7261:pyzmq
    volumes:
      - ./referencia.py:/app/main.py
    depends_on:
      - broker2
    deploy:
      replicas: 1

  servidor-python:
    build:
      context: .
      dockerfile: Dockerfile-Python
    image: cc7261:pyzmq
    volumes:
      - ./servidor.py:/app/main.py
    depends_on:
      - broker
      - broker2
    deploy:
      replicas: 1

  cliente-go:
    build:
      context: .
      dockerfile: Dockerfile-go
    command: go run cliente.go
    depends_on:
      - broker
    deploy:
      replicas: 1


