services:

  broker:
    build:
      context: .
      dockerfile: Dockerfile-Python
    image: cc7261:pyzmq
    container_name: broker
    volumes:
      - ./broker.py:/app/main.py
    ports:
      - 5555:5555
      - 5556:5556

  servidor-python:
    build:
      context: .
      dockerfile: Dockerfile-Python
    image: cc7261:pyzmq
    volumes:
      - ./servidor.py:/app/main.py
    depends_on:
      - broker
    deploy:
      replicas: 1

  cliente-python:
    build:
      context: .
      dockerfile: Dockerfile-Python
    image: cc7261:pyzmq
    volumes:
      - ./cliente.py:/app/main.py
    depends_on:
      - broker
    deploy:
      replicas: 1

  cliente-go:
    build:
      context: .
      dockerfile: Dockerfile-go
    command: go run cliente.go
    depends_on:
      - broker
    deploy:
      replicas: 1

  servidor-go:
    build:
      context: .
      dockerfile: Dockerfile-go
    command: go run servidor.go
    depends_on:
      - broker 
    deploy:
      replicas: 1
